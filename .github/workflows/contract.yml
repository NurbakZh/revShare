name: Smart Contract

on:
  push:
    paths:
      - 'programs/**'
      - 'tests/**'
      - 'Anchor.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    paths:
      - 'programs/**'
      - 'tests/**'
      - 'Anchor.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'

jobs:
  build:
    name: Build Contract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --force
          avm install 0.32.1
          avm use 0.32.1

      - name: Install Node dependencies
        run: yarn install

      - name: Generate Solana keypair
        run: solana-keygen new --no-bip39-passphrase --silent

      - name: Build
        run: anchor build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-artifacts
          path: |
            target/deploy/
            target/idl/
          retention-days: 1

  test:
    name: Test Contract
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --force
          avm install 0.32.1
          avm use 0.32.1

      - name: Install Node dependencies
        run: yarn install

      - name: Generate Solana keypair
        run: solana-keygen new --no-bip39-passphrase --silent

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: contract-artifacts
          path: target/

      - name: Run tests
        run: anchor test --skip-local-validator

  deploy:
    name: Deploy to Devnet
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --force
          avm install 0.32.1
          avm use 0.32.1

      - name: Install Node dependencies
        run: yarn install

      - name: Setup deploy keypair
        run: |
          echo "${{ secrets.DEPLOY_KEYPAIR }}" > /tmp/deploy-keypair.json
          solana config set --keypair /tmp/deploy-keypair.json
          solana config set --url devnet

      - name: Check balance
        run: |
          BALANCE=$(solana balance --lamports)
          echo "Deploy wallet balance: $BALANCE lamports"
          if [ "$BALANCE" -lt 1000000000 ]; then
            echo "Requesting airdrop..."
            solana airdrop 2 || true
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: contract-artifacts
          path: target/

      - name: Deploy contract
        run: anchor deploy --provider.cluster devnet

      - name: Cleanup keypair
        if: always()
        run: rm -f /tmp/deploy-keypair.json